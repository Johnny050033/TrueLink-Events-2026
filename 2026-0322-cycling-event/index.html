        :root {

            --bg-base: #10204d; /* Deep Indigo foundation */

            --bg-gradient: linear-gradient(135deg, var(--bg-base) 0%, var(--bg-accent) 100%);

            --accent-primary: #00f5ff; /* Vibrant Electric Cyan */

            --text-main: #e8e8e8;
            --text-title: #f5f5f5;

        header {

        .header-content {
            display: inline-flex;

            font-size: 0.8rem;

            color: var(--accent-secondary);

        .brand-logo {
            max-width: 140px;

        .card {

            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--card-border);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fade-in 1s ease-out;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: var(--accent-primary);
        }

        /* Text Styling */
        .highlight-text {
            color: var(--text-highlight);
            font-weight: 700;
        }

        h2 {
            font-size: 1.8rem;
            color: var(--text-title);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        h2::before {
            content: "\25BA"; /* Triangle icon escaped */
            font-size: 0.9rem;
            margin-right: 15px;
            color: var(--accent-secondary);
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .info-item {
            background: rgba(13, 42, 69, 0.3);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }
        .info-item:hover {
            background: rgba(13, 42, 69, 0.6);
            border-left-color: var(--accent-secondary);
        }
        .info-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            display: block;
        }
        .info-item strong {
            color: #fff;
        }

        /* List Styling */
        .checklist {
            list-style: none;
        }
        .checklist li {
            margin-bottom: 12px;
            padding-left: 30px;
            position: relative;
            transition: color 0.3s;
        }
        .checklist li:hover {
            color: #fff;
        }
        .checklist li::before {
            content: "\2713"; /* Checkmark escaped */
            position: absolute;
            left: 0;
            color: var(--accent-secondary);
            font-weight: bold;
        }

        /* Map Embed - Cleaner Dark Style */
        .map-wrapper {
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .map-wrapper:hover {
            border-color: var(--accent-primary);
        }
        iframe {
            width: 100%;
            height: 350px;
            border: 0;
            filter: grayscale(0.5) invert(0.9) contrast(1.1); /* Dark Map Style */
        }

        /* Table - Subtle dynamic effects */
        .geo-table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.3s;
        }
        th { color: var(--accent-secondary); font-weight: 700; }
        tr:hover td { background: rgba(0,0,0,0.2); }

        /* CTA Button - Vibrant gradient & micro-interaction */
        .cta-sticky {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 100;
        }
        .btn-line {
            display: block;
            background: var(--accent-gradient);
            color: #10204d; /* Matches bg base */
            text-align: center;
            padding: 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(0, 245, 255, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-line:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 183, 3, 0.5); /* Hover with gold shadow */
            background: linear-gradient(135deg, var(--accent-secondary) 0%, var(--accent-primary) 100%); /* Reverse gradient */
            color: #fff; /* Hover with white text */
        }

        footer {
            text-align: center;
            padding: 40px 0 120px;
            color: var(--text-dim);
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
